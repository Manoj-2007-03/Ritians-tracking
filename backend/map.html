<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Live Map – Ritians Transport</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#060A14;font-family:'DM Sans',sans-serif}

/* ── FULL SCREEN MAP ── */
#map{width:100%;height:100%;position:absolute;inset:0}

/* ── TOP BAR ── */
.top-bar{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;z-index:10;
  background:rgba(6,10,20,0.88);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.13);border-radius:99px;
  padding:8px 14px 8px 8px;box-shadow:0 8px 32px rgba(0,0,0,0.6);
  max-width:calc(100vw - 32px);
}
.back-btn{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.08);border:none;
  color:#F0F4FF;cursor:pointer;font-size:14px;transition:background 0.15s;flex-shrink:0;
}
.back-btn:hover{background:rgba(255,255,255,0.16)}
.vehicle-label{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#F0F4FF;
  white-space:nowrap;
}
.status-pill{
  font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;
  flex-shrink:0;transition:all 0.3s;
}
.status-moving{background:rgba(34,197,94,0.15);color:#4ADE80;border:1px solid rgba(34,197,94,0.3)}
.status-stopped{background:rgba(251,191,36,0.12);color:#FBBF24;border:1px solid rgba(251,191,36,0.25)}
.status-waiting{background:rgba(90,106,138,0.2);color:#9BAAC8;border:1px solid rgba(90,106,138,0.3)}
.status-offline{background:rgba(239,68,68,0.12);color:#F87171;border:1px solid rgba(239,68,68,0.25)}

/* ── BOTTOM INFO CARD ── */
.info-card{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(6,10,20,0.88);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.13);border-radius:20px;
  padding:16px 20px;z-index:10;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  display:flex;gap:20px;flex-wrap:wrap;
  max-width:calc(100vw - 32px);min-width:280px;
}
.info-item{display:flex;flex-direction:column;gap:2px}
.info-item-label{font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:#5A6A8A;font-weight:600}
.info-item-val{font-family:'DM Mono',monospace;font-size:13px;color:#F0F4FF;font-weight:500}

/* ── SIDE CONTROLS ── */
.side-controls{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:8px;z-index:10;
}
.ctrl-btn{
  width:40px;height:40px;border-radius:12px;
  background:rgba(6,10,20,0.88);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.13);
  display:flex;align-items:center;justify-content:center;
  color:#9BAAC8;cursor:pointer;font-size:14px;
  transition:all 0.15s;box-shadow:0 4px 16px rgba(0,0,0,0.4);
}
.ctrl-btn:hover{background:rgba(26,37,64,0.95);color:#F0F4FF}
.ctrl-btn.active{color:#4ECDC4;border-color:rgba(78,205,196,0.4)}

/* ── LOADING SCREEN ── */
.loading-screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#060A14;z-index:20;gap:16px;
  transition:opacity 0.5s;
}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-spinner{
  width:48px;height:48px;border-radius:50%;
  border:3px solid rgba(78,205,196,0.2);
  border-top-color:#4ECDC4;
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#F0F4FF}
.loading-sub{font-size:12px;color:#5A6A8A}

/* ── TOAST ── */
.toast{
  position:absolute;top:80px;left:50%;transform:translateX(-50%);
  background:rgba(26,37,64,0.95);border:1px solid rgba(255,255,255,0.15);
  border-radius:99px;padding:8px 18px;font-size:12px;color:#F0F4FF;
  z-index:15;box-shadow:0 4px 20px rgba(0,0,0,0.5);
  transition:opacity 0.3s;white-space:nowrap;
}
.toast.hidden{opacity:0;pointer-events:none}

@media(max-width:480px){
  .info-card{gap:14px;padding:14px 16px}
  .info-item-val{font-size:12px}
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-title">Loading Map…</div>
  <div class="loading-sub" id="loadingSub">Connecting to vehicle</div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
  <div class="vehicle-label" id="vehicleLabel">Bus —</div>
  <div class="status-pill status-waiting" id="statusPill">Connecting…</div>
</div>

<!-- SIDE CONTROLS -->
<div class="side-controls">
  <div class="ctrl-btn" onclick="centerOnVehicle()" title="Center on vehicle">
    <i class="fas fa-crosshairs"></i>
  </div>
  <div class="ctrl-btn" id="satelliteBtn" onclick="toggleSatellite()" title="Toggle satellite">
    <i class="fas fa-layer-group"></i>
  </div>
  <div class="ctrl-btn" onclick="openInGoogleMaps()" title="Open in Google Maps">
    <i class="fas fa-arrow-up-right-from-square"></i>
  </div>
</div>

<!-- BOTTOM INFO CARD -->
<div class="info-card">
  <div class="info-item">
    <div class="info-item-label">Speed</div>
    <div class="info-item-val" id="infoSpeed">— km/h</div>
  </div>
  <div class="info-item">
    <div class="info-item-label">Latitude</div>
    <div class="info-item-val" id="infoLat">—</div>
  </div>
  <div class="info-item">
    <div class="info-item-label">Longitude</div>
    <div class="info-item-val" id="infoLng">—</div>
  </div>
  <div class="info-item">
    <div class="info-item-label">Updated</div>
    <div class="info-item-val" id="infoAgo">—</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast hidden" id="toastEl"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const MAPS_API_KEY = 'AIzaSyAjCI_cdiIGzAGDbRMEOpyXDsjIx9SOObI'; // authorized key
const API_BASE     = window.location.origin;
const POLL_MS      = 3000; // poll every 3 seconds

// ── Read vehicleId from URL ───────────────────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
const vehicleId = params.get('vehicleId');

if (!vehicleId) {
  document.getElementById('loadingSub').textContent = 'No vehicle ID in URL!';
}

document.getElementById('vehicleLabel').textContent = `Bus ${vehicleId || '—'}`;
document.getElementById('loadingSub').textContent   = `Locating Bus ${vehicleId}…`;

// ── Map state ─────────────────────────────────────────────────────────────────
let map, marker, isSatellite = false;
let lastLat = null, lastLng = null;
let pollTimer;
let makeIcon; // defined inside initMap after API loads

// ── Dark map style ────────────────────────────────────────────────────────────
const darkStyle = [
  {elementType:'geometry',stylers:[{color:'#0C1220'}]},
  {elementType:'labels.text.stroke',stylers:[{color:'#060A14'}]},
  {elementType:'labels.text.fill',stylers:[{color:'#5A6A8A'}]},
  {featureType:'road',elementType:'geometry',stylers:[{color:'#1A2540'}]},
  {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#060A14'}]},
  {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#243050'}]},
  {featureType:'water',elementType:'geometry',stylers:[{color:'#060D1A'}]},
  {featureType:'poi',stylers:[{visibility:'off'}]},
  {featureType:'transit',stylers:[{visibility:'off'}]},
];

// ── Init Google Map ───────────────────────────────────────────────────────────
function initMap() {
  // makeIcon must be defined here — google.maps.SymbolPath only available after API loads
  makeIcon = function(color) {
    return {
      path: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
      fillColor: color,
      fillOpacity: 1,
      strokeColor: '#ffffff',
      strokeWeight: 1.5,
      scale: 1.6,
      anchor: new google.maps.Point(12, 22),
    };
  };
  map = new google.maps.Map(document.getElementById('map'), {
    zoom: 15,
    center: { lat: 10.3, lng: 77.9 }, // default center (Tamil Nadu)
    styles: darkStyle,
    disableDefaultUI: true,
    gestureHandling: 'greedy',
  });

  // Custom bus marker (makeIcon called after Maps API loaded)
  marker = new google.maps.Marker({
    map,
    title: `Bus ${vehicleId}`,
    icon: makeIcon('#4ECDC4'),
    optimized: false,
  });

  // Start polling
  fetchLocation();
  pollTimer = setInterval(fetchLocation, POLL_MS);
}

// ── Fetch location ────────────────────────────────────────────────────────────
async function fetchLocation() {
  if (!vehicleId) return;
  try {
    const res  = await fetch(`${API_BASE}/get-location/${vehicleId}`);
    const data = await res.json();

    if (!data.success) {
      setStatus('offline', 'Vehicle not found');
      updateInfoCard(null);
      return;
    }

    const { lat, lng, speed, status, isStale, updatedAt } = data;
    lastLat = lat;
    lastLng = lng;

    const pos = { lat, lng };
    marker.setPosition(pos);

    // Only auto-center first time or when very far off screen
    if (!map.getBounds() || !map.getBounds().contains(pos)) {
      map.panTo(pos);
    }

    // Hide loading screen
    document.getElementById('loadingScreen').classList.add('hidden');

    // Status pill
    if (isStale)              setStatus('offline',  'Offline');
    else if (status==='Moving') setStatus('moving', 'Moving');
    else                        setStatus('stopped','Stopped');

    // Info card
    updateInfoCard({ lat, lng, speed, updatedAt });

  } catch (e) {
    setStatus('offline', 'Connection error');
  }
}

// ── Update info card ──────────────────────────────────────────────────────────
function updateInfoCard(data) {
  if (!data) {
    document.getElementById('infoSpeed').textContent = '— km/h';
    document.getElementById('infoLat').textContent   = '—';
    document.getElementById('infoLng').textContent   = '—';
    document.getElementById('infoAgo').textContent   = '—';
    return;
  }
  const ago = Math.round((Date.now() - data.updatedAt) / 1000);
  document.getElementById('infoSpeed').textContent = `${data.speed || 0} km/h`;
  document.getElementById('infoLat').textContent   = data.lat.toFixed(5);
  document.getElementById('infoLng').textContent   = data.lng.toFixed(5);
  document.getElementById('infoAgo').textContent   = `${ago}s ago`;
}

// ── Status pill ───────────────────────────────────────────────────────────────
function setStatus(type, text) {
  const pill = document.getElementById('statusPill');
  pill.textContent  = text;
  pill.className    = `status-pill status-${type}`;

  // Update marker colour
  if (marker) {
    const colors = { moving:'#22C55E', stopped:'#FBBF24', offline:'#EF4444', waiting:'#4ECDC4' };
    marker.setIcon(makeIcon(colors[type] || '#4ECDC4'));
  }
}

// ── Controls ──────────────────────────────────────────────────────────────────
function centerOnVehicle() {
  if (lastLat !== null) { map.panTo({ lat: lastLat, lng: lastLng }); map.setZoom(16); }
  else showToast('Location not yet received');
}

function toggleSatellite() {
  isSatellite = !isSatellite;
  if (isSatellite) {
    map.setMapTypeId('hybrid');
    map.setOptions({ styles: [] });
  } else {
    map.setMapTypeId('roadmap');
    map.setOptions({ styles: darkStyle });
  }
  document.getElementById('satelliteBtn').classList.toggle('active', isSatellite);
}

function openInGoogleMaps() {
  if (lastLat !== null) {
    window.open(`https://www.google.com/maps?q=${lastLat},${lastLng}`, '_blank');
  } else {
    showToast('Location not yet received');
  }
}

function goBack() {
  clearInterval(pollTimer);
  window.history.length > 1 ? window.history.back() : window.location.href = 'tracking.html';
}

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add('hidden'), 2500);
}

// ── Load Google Maps API ───────────────────────────────────────────────────────
(function() {
  const s  = document.createElement('script');
  s.src    = `https://maps.googleapis.com/maps/api/js?key=${MAPS_API_KEY}&callback=initMap`;
  s.async  = true;
  s.defer  = true;
  s.onerror = () => {
    document.getElementById('loadingSub').textContent = 'Failed to load Google Maps API';
  };
  document.head.appendChild(s);
})();
</script>
</body>
</html>
