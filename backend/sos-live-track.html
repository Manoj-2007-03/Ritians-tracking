<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Live Track – Ritians SOS</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" crossorigin="anonymous"/>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --red:       #FF3535;
  --red-mid:   rgba(255,53,53,0.22);
  --red-glow:  rgba(255,53,53,0.50);
  --green:     #00D97E;
  --blue:      #3B8EFF;
  --blue-mid:  rgba(59,142,255,0.18);
  --bg:        #070B14;
  --surface:   rgba(10,15,28,0.94);
  --glass:     rgba(255,255,255,0.055);
  --border:    rgba(255,255,255,0.09);
  --border-hi: rgba(255,255,255,0.15);
  --text:      #EEF2FF;
  --muted:     #7D8DAD;
  --font:      'Sora', sans-serif;
  --mono:      'JetBrains Mono', monospace;
  --safe-top:  env(safe-area-inset-top, 0px);
  --safe-bot:  env(safe-area-inset-bottom, 0px);
}

html, body {
  width: 100%; height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* ── MAP (Leaflet owns this div) ── */
#map {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: #0a0f1e;
  /* Leaflet sets touch-action internally — do NOT override here */
}

/* Leaflet zoom controls — reposition so they don't clash with header */
.leaflet-top.leaflet-left { top: calc(var(--safe-top) + 80px); left: 14px; }
.leaflet-control-zoom {
  border: 1px solid var(--border-hi) !important;
  border-radius: 12px !important;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,.5) !important;
}
.leaflet-control-zoom a {
  background: rgba(10,15,28,.92) !important;
  backdrop-filter: blur(12px) !important;
  color: var(--text) !important;
  border-bottom: 1px solid var(--border) !important;
  font-size: 16px !important;
  line-height: 30px !important;
  width: 34px !important;
  height: 34px !important;
}
.leaflet-control-zoom a:hover { background: rgba(255,255,255,.12) !important; }
.leaflet-control-attribution { display: none !important; }

/* Pulsing emergency marker */
@keyframes markerPulse {
  0%   { transform: scale(1);   opacity: 1; }
  50%  { transform: scale(1.6); opacity: 0; }
  100% { transform: scale(1);   opacity: 0; }
}
.sos-marker-outer {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: rgba(255,53,53,0.18);
  border: 1.5px solid rgba(255,53,53,0.5);
  animation: markerPulse 1.8s ease-out infinite;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
}
.sos-marker-inner {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #FF3535;
  border: 2.5px solid #fff;
  box-shadow: 0 0 0 4px rgba(255,53,53,0.4), 0 4px 12px rgba(255,53,53,0.6);
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
}

/* Vignette — pointer-events:none so map touch passes through */
#map-vignette {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse 130% 38% at 50% 0%,   rgba(7,11,20,.85) 0%, transparent 100%),
    radial-gradient(ellipse 130% 42% at 50% 100%,  rgba(7,11,20,.90) 0%, transparent 100%);
}
#map-dim {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: rgba(7,11,20,0);
  transition: background .4s ease;
}

/* ── OVERLAYS ── */
#waitingOverlay {
  position: fixed; inset: 0; z-index: 20;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; background: var(--bg);
  transition: opacity .5s ease;
}
#waitingOverlay.hidden { opacity: 0; pointer-events: none; }

.wait-ring {
  width: 80px; height: 80px; border-radius: 50%;
  border: 1.5px solid var(--red-mid);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  animation: ringpulse 2.2s ease-in-out infinite;
}
.wait-ring::before {
  content: ''; position: absolute; inset: -14px; border-radius: 50%;
  border: 1px solid rgba(255,53,53,.1);
  animation: ringpulse 2.2s ease-in-out infinite .5s;
}
.wait-ring i { color: var(--red); font-size: 26px; }
@keyframes ringpulse {
  0%,100% { box-shadow: 0 0 0 0 var(--red-glow); }
  50%      { box-shadow: 0 0 0 20px transparent; }
}
.wait-title { font-size: 17px; font-weight: 600; }
.wait-sub   { font-size: 13px; color: var(--muted); }

/* ── TOP HEADER ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 40;
  padding: calc(var(--safe-top) + 10px) 14px 0;
  pointer-events: none;
}
.topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface);
  backdrop-filter: blur(22px) saturate(1.6);
  -webkit-backdrop-filter: blur(22px) saturate(1.6);
  border: 1px solid var(--border-hi);
  border-radius: 18px;
  padding: 10px 14px; gap: 12px;
  pointer-events: all;
  box-shadow: 0 8px 32px rgba(0,0,0,.45), 0 1px 0 rgba(255,255,255,.05) inset;
}
.back-btn {
  width: 38px; height: 38px; border-radius: 12px;
  background: var(--glass); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text); font-size: 14px; text-decoration: none;
  cursor: pointer; flex-shrink: 0; transition: background .2s;
}
.back-btn:hover { background: rgba(255,255,255,.12); }
.header-center { flex: 1; display: flex; flex-direction: column; align-items: center; }
.header-name { font-size: 15px; font-weight: 700; letter-spacing: .2px; }
.header-sub {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted); margin-top: 2px;
}
.track-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--green);
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.live-badge {
  display: flex; align-items: center; gap: 5px;
  background: var(--red-mid); border: 1px solid rgba(255,53,53,.32);
  border-radius: 20px; padding: 5px 12px; flex-shrink: 0;
}
.live-pulse {
  width: 7px; height: 7px; border-radius: 50%; background: var(--red);
  animation: livepulse 1s ease-in-out infinite;
}
@keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }
.live-badge span { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--red); }
.resolved-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,217,126,.14); border: 1px solid rgba(0,217,126,.3);
  border-radius: 20px; padding: 5px 13px; flex-shrink: 0;
}
.resolved-badge i { color: var(--green); font-size: 11px; }
.resolved-badge span { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; color: var(--green); }

/* ── FAB ── */
#fab-recenter {
  position: fixed; right: 16px; z-index: 35;
  width: 44px; height: 44px; border-radius: 14px;
  background: var(--surface);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--border-hi);
  display: flex; align-items: center; justify-content: center;
  color: var(--text); font-size: 16px; cursor: pointer;
  box-shadow: 0 4px 18px rgba(0,0,0,.45);
  transition: background .2s, bottom .42s cubic-bezier(.34,1.28,.64,1);
  bottom: 200px;
}
#fab-recenter:hover { background: rgba(255,255,255,.12); }
#fab-recenter:active { transform: scale(.92); }

/* ── BOTTOM SHEET ── */
#sheet-wrap {
  position: fixed; left: 0; right: 0; bottom: 0;
  z-index: 35;
  /* pointer-events:none on wrap means map behind is tappable everywhere
     except where #sheet itself has pointer-events:all */
  pointer-events: none;
}
#sheet {
  width: 100%;
  background: var(--surface);
  backdrop-filter: blur(28px) saturate(1.6);
  -webkit-backdrop-filter: blur(28px) saturate(1.6);
  border: 1px solid var(--border-hi);
  border-bottom: none;
  border-radius: 22px 22px 0 0;
  overflow: hidden;
  pointer-events: all;
  box-shadow: 0 -4px 40px rgba(0,0,0,.55), 0 1px 0 rgba(255,255,255,.04) inset;
  will-change: transform;
}

/* DRAG HANDLE — only zone that initiates sheet drag */
#drag-zone {
  display: flex; justify-content: center; align-items: center;
  padding: 13px 0 9px;
  cursor: ns-resize;
  /* Critical: tell browser WE own vertical gestures here only */
  touch-action: none;
}
.handle-pill {
  width: 38px; height: 4px; border-radius: 4px;
  background: rgba(255,255,255,.2);
  transition: background .2s, width .2s;
}
#drag-zone:hover .handle-pill { background: rgba(255,255,255,.38); width: 48px; }
#drag-zone:active .handle-pill { background: rgba(255,255,255,.5); width: 48px; }

/* PEEK ROW */
#peek-row {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 18px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.sos-icon-wrap {
  width: 42px; height: 42px; border-radius: 14px;
  background: var(--red-mid); border: 1px solid rgba(255,53,53,.26);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  animation: sosbreathe 2.4s ease-in-out infinite;
}
@keyframes sosbreathe {
  0%,100% { box-shadow: 0 0 0 0 var(--red-glow); }
  50%      { box-shadow: 0 0 0 9px transparent; }
}
.sos-icon-wrap i { color: var(--red); font-size: 18px; }
.sos-label { flex: 1; }
.sos-title    { font-size: 14px; font-weight: 700; color: var(--red); }
.sos-subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }
.signal-wrap { display: flex; align-items: flex-end; gap: 3px; }
.signal-bar  { width: 3px; border-radius: 2px; background: var(--green); }
.signal-bar:nth-child(1){ height: 6px; }
.signal-bar:nth-child(2){ height: 9px; }
.signal-bar:nth-child(3){ height: 12px; }
.signal-bar:nth-child(4){ height: 15px; opacity: .3; }
.chevron-up {
  font-size: 11px; color: var(--muted); margin-left: 6px;
  transition: transform .35s cubic-bezier(.34,1.28,.64,1);
}

/* SHEET BODY */
#sheet-body {
  overflow: hidden;
  transition: max-height .42s cubic-bezier(.4,0,.2,1), opacity .3s ease;
}

.coord-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 18px; border-bottom: 1px solid var(--border); gap: 10px;
}
.coord-left { display: flex; align-items: center; gap: 8px; }
.coord-left i { color: var(--red); font-size: 13px; }
.coord-val {
  font-family: var(--mono); font-size: 12.5px; color: #7DDFFF; letter-spacing: .4px;
}
.coord-time { font-size: 10px; color: var(--muted); margin-top: 1px; }
.gmaps-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--blue-mid); border: 1px solid rgba(59,142,255,.3);
  color: var(--blue); padding: 7px 14px; border-radius: 10px;
  font-size: 12px; font-weight: 600; text-decoration: none; white-space: nowrap;
  transition: background .2s; flex-shrink: 0;
}
.gmaps-btn:hover { background: rgba(59,142,255,.3); }

.action-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.action-btn {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  padding: 14px 8px; border-radius: 16px; border: none; cursor: pointer;
  font-family: var(--font); font-size: 12px; font-weight: 600; color: #fff;
  transition: transform .15s, filter .15s;
  position: relative; overflow: hidden;
}
.action-btn:active { transform: scale(.95); filter: brightness(.88); }
.action-btn i { font-size: 22px; }
.btn-driver {
  background: linear-gradient(145deg, #00C96A, #008F4C);
  box-shadow: 0 6px 22px rgba(0,201,106,.28);
}
.btn-admin {
  background: linear-gradient(145deg, #3B8EFF, #1A6CE0);
  box-shadow: 0 6px 22px rgba(59,142,255,.28);
}

.sos-stop-wrap { padding: 4px 18px 18px; }
.sos-stop-btn {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 16px; border-radius: 16px; border: none; cursor: pointer;
  font-family: var(--font); font-size: 14px; font-weight: 700; color: #fff; letter-spacing: .3px;
  background: linear-gradient(145deg, #FF2D2D, #C41A1A);
  box-shadow: 0 6px 28px rgba(255,45,45,.4);
  animation: stopbreathe 3s ease-in-out infinite;
  transition: transform .15s, filter .15s;
}
.sos-stop-btn:active { transform: scale(.97); filter: brightness(.88); }
@keyframes stopbreathe {
  0%,100% { box-shadow: 0 6px 28px rgba(255,45,45,.35); }
  50%      { box-shadow: 0 8px 38px rgba(255,45,45,.65); }
}
.safe-spacer { height: var(--safe-bot); min-height: 10px; }

/* ── CONFIRM MODAL ── */
#confirmModal {
  position: fixed; inset: 0; z-index: 60;
  background: rgba(7,11,20,.72);
  backdrop-filter: blur(10px);
  display: flex; align-items: flex-end; padding: 14px;
  transition: opacity .25s;
}
#confirmModal.hidden { opacity: 0; pointer-events: none; }
.modal-card {
  background: rgba(14,20,38,.98);
  border: 1px solid var(--border-hi); border-radius: 24px;
  padding: 26px 22px 20px;
  width: 100%; max-width: 440px; margin: 0 auto;
  display: flex; flex-direction: column; gap: 15px;
  box-shadow: 0 -4px 40px rgba(0,0,0,.6);
}
.modal-icon {
  width: 56px; height: 56px; border-radius: 18px;
  background: var(--red-mid); border: 1px solid rgba(255,53,53,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: var(--red); margin: 0 auto;
}
.modal-title { font-size: 17px; font-weight: 700; text-align: center; }
.modal-body  { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.65; }
.modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-cancel {
  padding: 14px; border-radius: 13px;
  background: var(--glass); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background .2s;
}
.modal-cancel:hover { background: rgba(255,255,255,.1); }
.modal-confirm {
  padding: 14px; border-radius: 13px;
  background: var(--red); border: none; color: #fff;
  font-family: var(--font); font-size: 14px; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 16px rgba(255,53,53,.4);
  transition: filter .2s;
}
.modal-confirm:hover { filter: brightness(1.1); }
</style>
</head>
<body>

<!-- LEAFLET MAP — rendered directly in DOM, no iframe, single-finger pan works natively -->
<div id="map"></div>
<div id="map-vignette"></div>
<div id="map-dim"></div>

<!-- WAITING OVERLAY -->
<div id="waitingOverlay">
  <div class="wait-ring"><i class="fas fa-location-crosshairs"></i></div>
  <div class="wait-title">Acquiring Location…</div>
  <div class="wait-sub">Waiting for student's GPS signal</div>
</div>

<!-- TOP HEADER -->
<div id="topbar">
  <div class="topbar-inner">
    <a href="sos-admin.html" class="back-btn" aria-label="Back">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="header-center">
      <div class="header-name" id="studentName">Loading…</div>
      <div class="header-sub">
        <div class="track-dot"></div>
        <span id="studentBus">Bus —</span>
        <span>· Live Tracking</span>
      </div>
    </div>
    <div class="live-badge" id="liveBadge">
      <div class="live-pulse"></div>
      <span>LIVE</span>
    </div>
  </div>
</div>

<!-- FAB -->
<button id="fab-recenter" aria-label="Recenter map">
  <i class="fas fa-location-crosshairs"></i>
</button>

<!-- BOTTOM SHEET -->
<div id="sheet-wrap">
  <div id="sheet">

    <!-- ONLY this zone starts sheet dragging -->
    <div id="drag-zone" aria-label="Drag to resize panel">
      <div class="handle-pill"></div>
    </div>

    <!-- Tapping peek-row cycles sheet states -->
    <div id="peek-row">
      <div class="sos-icon-wrap">
        <i class="fas fa-triangle-exclamation"></i>
      </div>
      <div class="sos-label">
        <div class="sos-title">SOS Triggered</div>
        <div class="sos-subtitle">Emergency response active</div>
      </div>
      <div class="signal-wrap">
        <div class="signal-bar"></div><div class="signal-bar"></div>
        <div class="signal-bar"></div><div class="signal-bar"></div>
      </div>
      <i class="fas fa-chevron-up chevron-up" id="peekChevron"></i>
    </div>

    <div id="sheet-body">
      <div class="coord-row">
        <div class="coord-left">
          <i class="fas fa-location-dot"></i>
          <div>
            <div class="coord-val" id="coordVal">Waiting for coordinates…</div>
            <div class="coord-time" id="updatedTime">—</div>
          </div>
        </div>
        <a id="gmapsBtn" href="#" target="_blank" class="gmaps-btn">
          <i class="fab fa-google"></i> Maps
        </a>
      </div>

      <div class="action-row">
        <button class="action-btn btn-driver" onclick="callDriver()">
          <i class="fas fa-phone"></i>
          <span>Call Driver</span>
        </button>
        <button class="action-btn btn-admin" onclick="callAdmin()">
          <i class="fas fa-shield-halved"></i>
          <span>Call Admin</span>
        </button>
      </div>

      <div class="sos-stop-wrap">
        <button class="sos-stop-btn" onclick="showConfirm()">
          <i class="fas fa-circle-xmark"></i>
          Stop SOS Alert
        </button>
      </div>
      <div class="safe-spacer"></div>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="hidden">
  <div class="modal-card">
    <div class="modal-icon"><i class="fas fa-circle-stop"></i></div>
    <div class="modal-title">Stop SOS Alert?</div>
    <div class="modal-body">Are you sure you want to end the emergency alert? All responders will be notified the situation is resolved.</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="hideConfirm()">Cancel</button>
      <button class="modal-confirm" onclick="stopSOS()">Yes, Stop SOS</button>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" crossorigin="anonymous"></script>
<script>
/* ═══════════════════════════════════════════════════════
   MAP — Leaflet, dark tile layer, custom SOS marker
   Single-finger pan works natively because Leaflet renders
   directly in the DOM (no cross-origin iframe sandbox).
═══════════════════════════════════════════════════════ */
const map = L.map('map', {
  center: [20.5937, 78.9629],   // India centre — replaced on first GPS fix
  zoom: 5,
  zoomControl: true,
  attributionControl: false,
  /* These Leaflet options ensure single-finger pan: */
  dragging: true,
  tap: true,
  touchZoom: true,
  bounceAtZoomLimits: false,
});

/* Dark map tile — CartoDB Dark Matter, free, no API key */
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd',
}).addTo(map);

/* Custom SOS marker using a DOM div */
const markerHtml = `
  <div style="position:relative;width:50px;height:50px;">
    <div class="sos-marker-outer"></div>
    <div class="sos-marker-inner"></div>
  </div>`;

const sosIcon = L.divIcon({
  html: markerHtml,
  className: '',
  iconSize: [50, 50],
  iconAnchor: [25, 25],
});

let sosMarker = null;

function placeMarker(lat, lng) {
  if (sosMarker) {
    sosMarker.setLatLng([lat, lng]);
  } else {
    sosMarker = L.marker([lat, lng], { icon: sosIcon }).addTo(map);
  }
}

function recenterMap(lat, lng) {
  map.setView([lat, lng], 17, { animate: true, duration: 0.6 });
}

/* ═══════════════════════════════════════════════════════
   SHEET STATE ENGINE  (PEEK=0 | MID=1 | EXP=2)
═══════════════════════════════════════════════════════ */
const sheet     = document.getElementById('sheet');
const sheetBody = document.getElementById('sheet-body');
const dragZone  = document.getElementById('drag-zone');
const peekRow   = document.getElementById('peek-row');
const peekChev  = document.getElementById('peekChevron');
const fabBtn    = document.getElementById('fab-recenter');
const mapDim    = document.getElementById('map-dim');

const S = { PEEK: 0, MID: 1, EXP: 2 };
let sheetState = S.MID;

function peekH() { return dragZone.offsetHeight + peekRow.offsetHeight; }
function fullH() { return sheet.scrollHeight; }
function expH()  { return Math.min(window.innerHeight * 0.78, fullH()); }

function snapY(s) {
  const wh = window.innerHeight;
  if (s === S.PEEK) return wh - peekH();
  if (s === S.MID)  return wh - fullH();
  return wh - expH();
}

function getLiveY() {
  return new DOMMatrix(getComputedStyle(sheet).transform).m42;
}

function applyY(y, animated) {
  const lo = snapY(S.EXP), hi = snapY(S.PEEK);
  y = Math.max(lo, Math.min(hi, y));
  sheet.style.transition = animated ? 'transform .42s cubic-bezier(.34,1.28,.64,1)' : 'none';
  sheet.style.transform = `translateY(${y}px)`;
  syncFab(y);
  syncDim(y);
  /* Invalidate map size when sheet moves so tiles fill correctly */
  map.invalidateSize({ animate: false });
}

function syncFab(y) {
  fabBtn.style.bottom = (window.innerHeight - y + 14) + 'px';
}

function syncDim(y) {
  const lo = snapY(S.EXP), hi = snapY(S.MID);
  const r = hi === lo ? 0 : Math.max(0, Math.min(1, (hi - y) / (hi - lo)));
  mapDim.style.background = `rgba(7,11,20,${(r * 0.22).toFixed(3)})`;
}

function snap(s, animated = true) {
  sheetState = s;
  applyY(snapY(s), animated);
  peekChev.style.transform = s === S.PEEK ? 'rotate(0deg)' : 'rotate(180deg)';
  if (s === S.PEEK) {
    sheetBody.style.maxHeight = '0px';
    sheetBody.style.opacity = '0';
  } else {
    sheetBody.style.maxHeight = '600px';
    sheetBody.style.opacity = '1';
  }
}

/* ═══════════════════════════════════════════════════════
   GESTURE ENGINE
   KEY INSIGHT: touch-action:none is set ONLY on #drag-zone.
   The map div has no touch-action override — Leaflet gets
   100% of touch events on the map and handles single-finger
   pan natively. The sheet gesture fires ONLY when the
   touchstart originates inside #drag-zone.
═══════════════════════════════════════════════════════ */
let dragging     = false;
let startCY      = 0;
let startSY      = 0;
let velBuf       = [];
let lastTY       = 0;
let lastTT       = 0;

function onDragStart(cy) {
  dragging = true;
  startCY  = cy;
  startSY  = getLiveY();
  lastTY   = cy;
  lastTT   = performance.now();
  velBuf   = [];
  sheet.style.transition = 'none';
}

function onDragMove(cy) {
  if (!dragging) return;
  const now = performance.now();
  const dt  = Math.max(now - lastTT, 1);
  velBuf.push((cy - lastTY) / dt);
  if (velBuf.length > 6) velBuf.shift();
  lastTY = cy; lastTT = now;

  let ny = startSY + (cy - startCY);
  const lo = snapY(S.EXP), hi = snapY(S.PEEK);
  if (ny < lo) ny = lo - (lo - ny) * 0.26;  // rubber-band top
  if (ny > hi) ny = hi + (ny - hi) * 0.26;  // rubber-band bottom

  sheet.style.transform = `translateY(${ny}px)`;
  syncFab(ny);
  syncDim(ny);
}

function onDragEnd() {
  if (!dragging) return;
  dragging = false;

  const avg = velBuf.length ? velBuf.reduce((a,b)=>a+b,0)/velBuf.length : 0;
  const cy  = getLiveY();

  /* Velocity flick — fast swipe overrides position */
  if (avg > 0.65) { snap(sheetState === S.EXP ? S.MID : S.PEEK); return; }
  if (avg < -0.65){ snap(sheetState === S.PEEK ? S.MID : S.EXP); return; }

  /* Nearest snap point */
  const best = [S.PEEK, S.MID, S.EXP]
    .map(s => ({ s, d: Math.abs(cy - snapY(s)) }))
    .sort((a,b) => a.d - b.d)[0];
  snap(best.s);
}

/* ── Attach drag-zone touch/mouse listeners ── */
dragZone.addEventListener('touchstart', e => {
  e.stopPropagation();           // don't let Leaflet see this touch
  onDragStart(e.touches[0].clientY);
}, { passive: true });

/* Listen on window so finger can move freely during drag */
window.addEventListener('touchmove', e => {
  if (!dragging) return;
  onDragMove(e.touches[0].clientY);
  /* NOTE: we deliberately do NOT call e.preventDefault() here.
     Leaflet's own touchmove won't fire if dragging=true because
     Leaflet never received the touchstart (we stopPropagation'd it). */
}, { passive: true });

window.addEventListener('touchend', () => { if (dragging) onDragEnd(); }, { passive: true });
window.addEventListener('touchcancel', () => { if (dragging) onDragEnd(); }, { passive: true });

/* Mouse fallback for desktop testing */
dragZone.addEventListener('mousedown', e => {
  e.preventDefault();
  onDragStart(e.clientY);
  const mv = ev => onDragMove(ev.clientY);
  const up = () => { onDragEnd(); window.removeEventListener('mousemove', mv); window.removeEventListener('mouseup', up); };
  window.addEventListener('mousemove', mv);
  window.addEventListener('mouseup', up);
});

/* Peek row tap — cycles up then down */
peekRow.addEventListener('click', () => {
  if (sheetState === S.PEEK)    snap(S.MID);
  else if (sheetState === S.MID) snap(S.EXP);
  else                           snap(S.MID);
});

/* Init */
function initSheet() {
  sheetBody.style.maxHeight = '600px';
  sheetBody.style.opacity   = '1';
  sheetBody.style.transition = 'max-height .42s cubic-bezier(.4,0,.2,1), opacity .3s ease';
  snap(S.MID, false);
}
requestAnimationFrame(() => requestAnimationFrame(initSheet));
window.addEventListener('resize', () => snap(sheetState, false));

/* ═══════════════════════════════════════════════════════
   URL PARAMS & LIVE TRACKING
═══════════════════════════════════════════════════════ */
const urlP        = new URLSearchParams(window.location.search);
const alertId     = urlP.get('id');
const studentName = urlP.get('name') || 'Student';
const busId       = urlP.get('bus')  || 'Unknown';

document.getElementById('studentName').textContent = studentName;
document.getElementById('studentBus').textContent  = 'Bus ' + busId;

const API = window.location.origin;
let lastLat = null, lastLng = null, pollInterval = null;

async function fetchLocation() {
  if (!alertId) return;
  try {
    const res  = await fetch(`${API}/api/sos/location/${alertId}`);
    const data = await res.json();
    if (!data.success || !data.latitude || !data.longitude) return;

    const lat = parseFloat(data.latitude);
    const lng = parseFloat(data.longitude);

    document.getElementById('waitingOverlay').classList.add('hidden');
    document.getElementById('coordVal').textContent = `${lat.toFixed(6)},  ${lng.toFixed(6)}`;
    document.getElementById('gmapsBtn').href = `https://maps.google.com/?q=${lat},${lng}`;

    const t = data.lastLocationAt ? new Date(data.lastLocationAt) : new Date();
    document.getElementById('updatedTime').textContent =
      'Updated ' + t.toLocaleTimeString('en-IN', {
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: true, timeZone: 'Asia/Kolkata'
      });

    const moved = lastLat === null
      || Math.abs(lat - lastLat) > 0.0001
      || Math.abs(lng - lastLng) > 0.0001;

    if (moved) {
      lastLat = lat; lastLng = lng;
      placeMarker(lat, lng);
      recenterMap(lat, lng);
    }

    if (data.status && data.status !== 'active') {
      clearInterval(pollInterval);
      const badge = document.getElementById('liveBadge');
      badge.className = 'resolved-badge';
      badge.innerHTML = '<i class="fas fa-check"></i><span>RESOLVED</span>';
    }
  } catch(e) {}
}

fetchLocation();
pollInterval = setInterval(fetchLocation, 3000);

/* FAB — recenter to last known position */
fabBtn.addEventListener('click', () => {
  if (lastLat !== null) recenterMap(lastLat, lastLng);
});

/* Modal & actions */
function showConfirm() { document.getElementById('confirmModal').classList.remove('hidden'); }
function hideConfirm() { document.getElementById('confirmModal').classList.add('hidden'); }
async function stopSOS() {
  hideConfirm();
  if (!alertId) return;
  try { await fetch(`${API}/api/sos/resolve/${alertId}`, { method: 'POST' }); } catch(e) {}
}
function callDriver() {
  const tel = document.getElementById('driverTel')?.value;
  if (tel) window.location.href = 'tel:' + tel;
}
function callAdmin() {
  const tel = document.getElementById('adminTel')?.value;
  if (tel) window.location.href = 'tel:' + tel;
}
</script>
